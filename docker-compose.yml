services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rga_pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: ai_act_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_act_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rga_api
    depends_on:
      db:
        condition: service_healthy
      llm_proxy:
        condition: service_started
    environment:
      DB_CONN_STRING: postgresql://admin:secret_password@db:5432/ai_act_db
      PRIVATEMODE_PROXY_URL: ${PRIVATEMODE_PROXY_URL:-http://llm_proxy:8080/v1}
      PRIVATEMODE_API_KEY: ${PRIVATEMODE_API_KEY:-placeholder}
      PRIVATEMODE_MODEL: gpt-oss-latest
      PRIVATEMODE_EMBEDDING_MODEL: qwen3-embedding-4b
      PRIVATEMODE_EMBEDDING_DIM: "2560"
      API_HOST: 0.0.0.0
      API_PORT: "8011"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      llm_proxy:
        condition: service_started
    profiles: ["ingest"]
    environment:
      DB_CONN_STRING: postgresql://admin:secret_password@db:5432/ai_act_db
      PRIVATEMODE_PROXY_URL: ${PRIVATEMODE_PROXY_URL:-http://llm_proxy:8080/v1}
      PRIVATEMODE_API_KEY: ${PRIVATEMODE_API_KEY:-placeholder}
      PRIVATEMODE_EMBEDDING_MODEL: qwen3-embedding-4b
      PRIVATEMODE_EMBEDDING_DIM: "2560"
    command: ["python", "-m", "app.repository.vectorize"]

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rga_streamlit
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8011
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]

  llm_proxy:
    image: ghcr.io/edgelesssys/privatemode/privatemode-proxy:latest
    container_name: rga_llm_proxy
    restart: unless-stopped
    command: ["--apiKey", "${PRIVATEMODE_API_KEY:-placeholder}"]
    ports:
      - "8080:8080"

volumes:
  pgdata:
